<svg width="800" height="200" viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', sans-serif">

  <!-- Background -->
  <rect width="800" height="200" fill="#fafafa"/>

  <!-- Step 1: 기획 (lavender) -->
  <rect x="20" y="60" width="120" height="80" rx="16" ry="16" fill="#e8d5f5" stroke="#c9a8e8" stroke-width="1.5"/>
  <text x="80" y="94" text-anchor="middle" font-size="22" fill="#7b4fa6">📋</text>
  <text x="80" y="116" text-anchor="middle" font-size="14" font-weight="600" fill="#5a3480">기획</text>
  <text x="80" y="132" text-anchor="middle" font-size="10" fill="#8a5abf">Planning</text>

  <!-- Arrow 1→2 -->
  <line x1="140" y1="100" x2="168" y2="100" stroke="#bbb" stroke-width="2"/>
  <polygon points="168,95 178,100 168,105" fill="#bbb"/>

  <!-- Step 2: 제작 (sky blue) -->
  <rect x="180" y="60" width="120" height="80" rx="16" ry="16" fill="#cce8fb" stroke="#93ccf0" stroke-width="1.5"/>
  <text x="240" y="94" text-anchor="middle" font-size="22" fill="#1a72a8">🛠️</text>
  <text x="240" y="116" text-anchor="middle" font-size="14" font-weight="600" fill="#1a5276">제작</text>
  <text x="240" y="132" text-anchor="middle" font-size="10" fill="#4a90b8">Production</text>

  <!-- Arrow 2→3 -->
  <line x1="300" y1="100" x2="328" y2="100" stroke="#bbb" stroke-width="2"/>
  <polygon points="328,95 338,100 328,105" fill="#bbb"/>

  <!-- Step 3: 검토 (mint green) -->
  <rect x="340" y="60" width="120" height="80" rx="16" ry="16" fill="#c8f0e0" stroke="#7dd8b0" stroke-width="1.5"/>
  <text x="400" y="94" text-anchor="middle" font-size="22" fill="#1a8a55">🔍</text>
  <text x="400" y="116" text-anchor="middle" font-size="14" font-weight="600" fill="#1a5e3a">검토</text>
  <text x="400" y="132" text-anchor="middle" font-size="10" fill="#3aaa70">Review</text>

  <!-- Arrow 3→4 -->
  <line x1="460" y1="100" x2="488" y2="100" stroke="#bbb" stroke-width="2"/>
  <polygon points="488,95 498,100 488,105" fill="#bbb"/>

  <!-- Step 4: 배포 (peach) -->
  <rect x="500" y="60" width="120" height="80" rx="16" ry="16" fill="#fde4cc" stroke="#f5b07a" stroke-width="1.5"/>
  <text x="560" y="94" text-anchor="middle" font-size="22" fill="#c0622a">🚀</text>
  <text x="560" y="116" text-anchor="middle" font-size="14" font-weight="600" fill="#8a3d10">배포</text>
  <text x="560" y="132" text-anchor="middle" font-size="10" fill="#c07840">Deploy</text>

  <!-- Arrow 4→5 -->
  <line x1="620" y1="100" x2="648" y2="100" stroke="#bbb" stroke-width="2"/>
  <polygon points="648,95 658,100 648,105" fill="#bbb"/>

  <!-- Step 5: 분석 (yellow) -->
  <rect x="660" y="60" width="120" height="80" rx="16" ry="16" fill="#fdf3c0" stroke="#f0d060" stroke-width="1.5"/>
  <text x="720" y="94" text-anchor="middle" font-size="22" fill="#a08010">📊</text>
  <text x="720" y="116" text-anchor="middle" font-size="14" font-weight="600" fill="#6e5800">분석</text>
  <text x="720" y="132" text-anchor="middle" font-size="10" fill="#a08828">Analysis</text>

  <!-- Step numbers -->
  <circle cx="50" cy="68" r="10" fill="#e8d5f5" stroke="#c9a8e8" stroke-width="1"/>
  <text x="50" y="72" text-anchor="middle" font-size="10" font-weight="700" fill="#7b4fa6">1</text>

  <circle cx="210" cy="68" r="10" fill="#cce8fb" stroke="#93ccf0" stroke-width="1"/>
  <text x="210" y="72" text-anchor="middle" font-size="10" font-weight="700" fill="#1a72a8">2</text>

  <circle cx="370" cy="68" r="10" fill="#c8f0e0" stroke="#7dd8b0" stroke-width="1"/>
  <text x="370" y="72" text-anchor="middle" font-size="10" font-weight="700" fill="#1a8a55">3</text>

  <circle cx="530" cy="68" r="10" fill="#fde4cc" stroke="#f5b07a" stroke-width="1"/>
  <text x="530" y="72" text-anchor="middle" font-size="10" font-weight="700" fill="#c0622a">4</text>

  <circle cx="690" cy="68" r="10" fill="#fdf3c0" stroke="#f0d060" stroke-width="1"/>
  <text x="690" y="72" text-anchor="middle" font-size="10" font-weight="700" fill="#a08010">5</text>

</svg>
