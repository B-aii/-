<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>김비서를 소개합니다</title>
  <style>
    :root {
      --bg-grad-1: #667eea;
      --bg-grad-2: #764ba2;
      --bg-grad-3: #f093fb;
      --glass-bg: rgba(255,255,255,0.18);
      --glass-border: rgba(255,255,255,0.30);
      --glass-shadow: 0 8px 32px rgba(31,38,135,0.22);
      --text-primary: #1a1a2e;
      --text-secondary: #4b5563;
      --text-muted: #6b7280;
      --badge-bg: rgba(255,255,255,0.35);
      --badge-color: #3730a3;
      --btn-shadow: 0 8px 32px rgba(102,126,234,0.45);
      --toggle-bg: rgba(255,255,255,0.25);
      --toggle-border: rgba(255,255,255,0.4);
    }
    [data-theme="dark"] {
      --bg-grad-1: #0f0f23;
      --bg-grad-2: #1a1a3e;
      --bg-grad-3: #2d1b69;
      --glass-bg: rgba(255,255,255,0.05);
      --glass-border: rgba(255,255,255,0.12);
      --glass-shadow: 0 8px 32px rgba(0,0,0,0.45);
      --text-primary: #e0e0e0;
      --text-secondary: #a0aec0;
      --text-muted: #718096;
      --badge-bg: rgba(139,92,246,0.25);
      --badge-color: #c4b5fd;
      --btn-shadow: 0 8px 32px rgba(139,92,246,0.45);
      --toggle-bg: rgba(255,255,255,0.08);
      --toggle-border: rgba(255,255,255,0.15);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', 'Apple SD Gothic Neo', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--bg-grad-1) 0%, var(--bg-grad-2) 50%, var(--bg-grad-3) 100%);
      transition: background 0.4s ease;
      position: relative;
      overflow: hidden;
    }

    /* 배경 장식 orbs */
    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.35;
      pointer-events: none;
      z-index: 0;
    }
    body::before {
      width: 500px; height: 500px;
      background: radial-gradient(circle, #a78bfa, transparent);
      top: -150px; left: -150px;
    }
    body::after {
      width: 400px; height: 400px;
      background: radial-gradient(circle, #f472b6, transparent);
      bottom: -100px; right: -100px;
    }

    /* 다크/라이트 토글 */
    .theme-toggle {
      position: fixed;
      top: 20px; right: 24px;
      z-index: 100;
      background: var(--toggle-bg);
      border: 1px solid var(--toggle-border);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 50px;
      padding: 8px 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-primary);
      transition: all 0.3s ease;
      box-shadow: var(--glass-shadow);
    }
    .theme-toggle:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 40px rgba(0,0,0,0.2);
    }
    .theme-toggle .toggle-icon { font-size: 16px; }

    /* 메인 컨테이너 */
    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 60px 40px;
      max-width: 740px;
      width: 100%;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--badge-bg);
      color: var(--badge-color);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid var(--glass-border);
      font-size: 13px;
      font-weight: 700;
      padding: 7px 20px;
      border-radius: 50px;
      margin-bottom: 32px;
      letter-spacing: 0.8px;
      text-transform: uppercase;
    }
    [data-theme="light"] .badge { color: #3730a3; }

    h1 {
      font-size: 58px;
      font-weight: 900;
      color: var(--text-primary);
      margin-bottom: 22px;
      line-height: 1.15;
      letter-spacing: -1px;
      text-shadow: 0 2px 20px rgba(0,0,0,0.15);
    }
    [data-theme="dark"] h1 { color: #ffffff; }
    h1 .accent {
      background: linear-gradient(135deg, #a78bfa, #f472b6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .tagline {
      font-size: 17px;
      color: var(--text-secondary);
      margin-bottom: 60px;
      line-height: 1.8;
    }
    [data-theme="dark"] .tagline { color: rgba(224,224,224,0.75); }

    /* 피처 카드 */
    .features {
      display: flex;
      gap: 20px;
      justify-content: center;
      margin-bottom: 60px;
      flex-wrap: wrap;
    }

    .feature-card {
      background: var(--glass-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      padding: 32px 22px;
      width: 200px;
      box-shadow: var(--glass-shadow);
      transition: transform 0.25s ease, box-shadow 0.25s ease;
      cursor: default;
    }
    .feature-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 20px 50px rgba(0,0,0,0.25);
    }

    .feature-icon { font-size: 38px; margin-bottom: 14px; }

    .feature-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 8px;
    }
    [data-theme="dark"] .feature-title { color: #e0e0e0; }

    .feature-desc {
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.55;
    }
    [data-theme="dark"] .feature-desc { color: rgba(224,224,224,0.55); }

    /* CTA 버튼 */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff;
      font-size: 18px;
      font-weight: 700;
      padding: 18px 56px;
      border-radius: 50px;
      text-decoration: none;
      box-shadow: var(--btn-shadow);
      transition: transform 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease;
      letter-spacing: 0.3px;
    }
    [data-theme="dark"] .btn {
      background: linear-gradient(135deg, #7c3aed, #db2777);
    }
    .btn:hover {
      transform: translateY(-3px) scale(1.03);
      box-shadow: 0 16px 48px rgba(102,126,234,0.55);
      filter: brightness(1.1);
    }
    .btn-arrow { font-size: 20px; transition: transform 0.2s; }
    .btn:hover .btn-arrow { transform: translateX(4px); }
  </style>
</head>
<body>

  <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">
    <span class="toggle-icon" id="themeIcon">☀️</span>
    <span id="themeLabel">라이트 모드</span>
  </button>

  <div class="container">
    <div class="badge">✦ AI 업무 비서</div>
    <h1>김비서를<br><span class="accent">소개합니다</span></h1>
    <p class="tagline">
      김비서는 당신의 업무를 한눈에 정리해주는 스마트 대시보드입니다.<br>
      할 일, 일정, 프로젝트, 매출을 한 화면에서 확인하세요.
    </p>
    <div class="features">
      <div class="feature-card">
        <div class="feature-icon">✅</div>
        <div class="feature-title">할 일 관리</div>
        <div class="feature-desc">우선순위별로 업무를 정리하고 진행 상태를 추적합니다</div>
      </div>
      <div class="feature-card">
        <div class="feature-icon">📅</div>
        <div class="feature-title">주간 일정</div>
        <div class="feature-desc">이번 주 월~금 일정을 한눈에 파악할 수 있습니다</div>
      </div>
      <div class="feature-card">
        <div class="feature-icon">📊</div>
        <div class="feature-title">프로젝트 현황</div>
        <div class="feature-desc">진행 중인 프로젝트의 진행률을 시각적으로 보여줍니다</div>
      </div>
    </div>
    <a href="dashboard.html" class="btn">내 대시보드 보기 <span class="btn-arrow">→</span></a>
  </div>

  <script>
    const html = document.documentElement;
    const btn = document.getElementById('themeBtn');
    const icon = document.getElementById('themeIcon');
    const label = document.getElementById('themeLabel');

    function applyTheme(theme) {
      html.setAttribute('data-theme', theme);
      if (theme === 'dark') {
        icon.textContent = '☀️';
        label.textContent = '라이트 모드';
      } else {
        icon.textContent = '🌙';
        label.textContent = '다크 모드';
      }
    }

    function toggleTheme() {
      const current = html.getAttribute('data-theme');
      const next = current === 'dark' ? 'light' : 'dark';
      localStorage.setItem('kimbiseo-theme', next);
      applyTheme(next);
    }

    // 저장된 테마 불러오기 (없으면 다크)
    const saved = localStorage.getItem('kimbiseo-theme') || 'dark';
    applyTheme(saved);
  </script>
</body>
</html>
